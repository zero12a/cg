<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>tab</title>
    <link rel="stylesheet" href="/lib/bootstrap4/css/bootstrap.min.css">
    <script src="/lib/bootstrap4/jquery-3.4.1.slim.min.js"></script>
    <script src="/lib/bootstrap4/js/bootstrap.min.js"></script>

    <!-- 아이콘-->
    <script src="/lib/feather.min.js"></script>

    <style>
    
    body, html {
        height: 100%;
        padding:0px 0px 0px 0px;
        margin:0px 0px 0px 0px;
        overflow:auto;
    }
    .BODY_BOX {
        overflow:visible;
        width:100%;
        height:100%;
        padding:0px 0px 0px 0px;
        margin:0px 0px 0px 0px;
        z-index:1;
        font-family: "Nanum Gothic", sans-serif;
    }

    .nav-tabs-mystyle > a.active {
        background-color: red;
    }
    
    .tab-iframe{
        padding:0px 0px 0px 0px;
    }

    /* 좌측 메뉴 사이즈 고정 */
    .col-pixel-width { flex: 0 0 200px; }

    </style>
    <script>

    function tabClose(tmpId){
        //alert(tmpId + "-close click");
        $( "#" + tmpId + "-li" ).remove();
        $( "#" + tmpId + "-content" ).remove();

        //첫번째 tab 활성화
        $('#myTab2 a').removeClass('active'); //탭선택 모두 제거
        $("#myTab2 a:first").addClass('active'); //탭선택 

        //컨텐츠 active show
        $('#myTabContent div').removeClass('active show'); //탭선택 모두 제거            
        $("#myTabContent div:first").addClass('active show'); //탭선택 

        //alert("close 처리 완료");

    }
    $( document ).ready(function() {

        $("#menu a").click(function (e){
            //alert("inbox click");
            //alert($(this).attr("id"));
            var id = $(this).attr("id");
            var nm = $(this).text();
            var url = $(this).attr("my-url");
            //alert($("#" + id + "-li"));
            if($(this).attr("id") == undefined)return; //ID 없으면 폴더임.
            //if($("#" + id + "-li") != undefined)return;//이미 생성된 메뉴이면 리턴

            //$(this).closest('li').before('<li><a href="#contact_' + id + '">New Tab</a> <span>x</span></li>');
            var closeTxt = '<button onclick="tabClose(\'' + id + '\');" id="' + id + '-close" type="button" class="close text-lg-right" aria-label="Close"><span aria-hidden="true">&times;</span></button>';

            $('#myTab2').append('<li id="' + id + '-li" class="nav-item"><a class="nav-link" id="' + id + '-tab" data-toggle="tab" href="#' + id + '-content" role="tab" aria-controls="' + id + '-content" aria-selected="false">' + nm + ' ' + closeTxt + '</a></li>');
            $('#myTabContent').append('<div class="tab-pane tab-iframe" id="' + id + '-content" role="tabpanel" aria-labelledby="' + id + '-tab"  style="background-color:green;height:inherit;"><iframe frameborder=”0″ marginwidth=”0″ marginheight=”0″ style="height:100%;width:100%" id="' + id + '-iframe" src=""></iframe></div>');
            
            imestampSecond = Math.floor(+ new Date() / 1000);            
            $("#" + id + "-iframe").attr('src', url + "?" + imestampSecond);

            //탭활성화
            //$("#" + id + "-li").tab('show');

            //탭 active
            $('#myTab2 a').removeClass('active'); //탭선택 모두 제거
            $("#" + id + "-tab").addClass('active'); //탭선택 

            //컨텐츠 active show
            $('#myTabContent div').removeClass('active show'); //탭선택 모두 제거            
            $("#" + id + "-content").addClass('active show'); //탭선택 
            //alert(1);
        });
        $('#myTab2 a').click(function (e) {
            e.preventDefault();
        
            var url = $(this).attr("data-url");
            
            var href = this.hash;
            var pane = $(this);
            
            imestampSecond = Math.floor(+ new Date() / 1000);

            $("#iframe1").attr('src', url + "?" + imestampSecond);

            $('myTab2 li').removeClass('active');
            $(this).addClass('active');
            // ajax load from data-url
            //$(href).load(url,function(result){      
            //pane.tab('show');
            //});
        });

        //alert( "document ready!" );
        feather.replace();
    });

    function menuToggle(){
        //alert($("#divMenu").css("display"));
        if($("#divMenu").css("display") != "none"){
            $("#divMenu").css("display","none");
        }else{
            $("#divMenu").css("display","");
        }
        //alert($("#divMenu").css("display"));
    }

    </script>
            
</head>

<body>
<div id="BODY_BOX" class="BODY_BOX">
    <div class="col border-bottom border-dark" style="background-color:green;height:40px;z-index:2;">top menu <a href="#" onclick="menuToggle()">메뉴닫기.</a></div>
    <div class="fixed-top container-fluid h-100 m-0" style="padding-top:40px;z-index:1;">
        <div class="row h-100">
            <div id="divMenu" class="col-pixel-width h-100 p-0 border-right border-dark">
                <div class="panel list-group" id="menu">
                    <a href="#" class="list-group-item rounded-0" data-toggle="collapse" data-target="#sm" data-parent="#menu"><i style="padding-left:0px;padding-top:0px;"
                    color="silver" 
                    width="20"
                    height="20"
                    data-feather="folder"></i> <span class="align-middle">MESSAGES</span></a>
                        <div id="sm" class="sublinks collapse">
                            <a id="inbox" href="#" my-url="feather.html" my-nm="inbox" class="list-group-item small rounded-0"><i style="padding-left:0px;padding-top:0px;"
                            color="silver" 
                            width="20"
                            height="20"
                            data-feather="chevron-right"></i> inbox</a>
                            <a id="sent" href="#" my-url="bootstrap3.html" class="list-group-item small rounded-0"><i style="padding-left:0px;padding-top:0px;"
                            color="silver" 
                            width="20"
                            height="20"
                            data-feather="chevron-right"></i> sent</a>
                        </div>
                    <a href="#" class="list-group-item rounded-0" data-toggle="collapse" data-target="#sl" data-parent="#menu"><i style="padding-left:0px;padding-top:0px;"
                        color="silver" 
                        width="20"
                        height="20"
                        data-feather="folder"></i> <span class="align-middle">TASKS</span> <span class="glyphicon glyphicon-tag pull-right"></span></a>
                        <div id="sl" class="sublinks collapse">
                            <a class="list-group-item small rounded-0"> saved tasks</a>
                            <a class="list-group-item small rounded-0"> add new task</a>
                        </div>
                    <a href="#" class="list-group-item rounded-0">ANOTHER LINK ...<span class="glyphicon glyphicon-stats pull-right"></span></a>
                </div>                
            </div>
            <div class="col h-100 p-0">
                <ul class="nav nav-tabs nav-tabs-mystyle" id="myTab2" role="tablist">
                    
                </ul>
                <div class="tab-content h-100" id="myTabContent" style="padding-bottom:40px;">
                    
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
